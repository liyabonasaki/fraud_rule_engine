spring:
  application:
    name: fraud-rule-engine
  
  datasource:
    url: jdbc:h2:mem:frauddb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Fraud detection thresholds
fraud:
  rules:
    high-amount-threshold: 10000.00
    velocity-check-window-minutes: 60
    velocity-max-transactions: 5
    suspicious-amount-threshold: 5000.00
    daily-limit: 50000.00

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
